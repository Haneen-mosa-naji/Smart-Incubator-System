  <!--  start loader -->
  <div class="loader-overlay d-none">

    <svg class="smart-loader" width="180" height="180" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">

      <!-- outer circle -->
      <circle cx="150" cy="150" r="120" fill="none" stroke="#00AEEF" stroke-width="6" stroke-dasharray="80 40"
        stroke-linecap="round" class="loader-ring">


      </circle>

      <!-- incubator (60x50) -->
      <rect x="120" y="135" width="60" height="50" rx="8" fill="#E6F7FF" stroke="#00AEEF" stroke-width="2" />

      <!-- heartbeat (scaled up + centered) -->
      <path d="M75 160
             Q105 135 130 160
             T175 160
             T225 160" fill="none" stroke="#FF4D6D" stroke-width="4">

        <animate attributeName="stroke-width" values="2.5;5;2.5" dur="0.8s" repeatCount="indefinite" />
      </path>

      <!-- text -->
      <text x="150" y="225" font-size="14" font-weight="bold" text-anchor="middle" fill="#333" font-family="Arial">
        Smart Incubator
      </text>

    </svg>

  </div>
  <!--  end loader -->
