<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login Page-Smart-Incubator-System</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
 <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./assets/css/main.css" rel="stylesheet"> 
    <link href="./assets/css/login.css" rel="stylesheet">

</head>

<body class="login">
    <div class="overlay ">
        <div class="container d-flex justify-content-center align-items-center ">
  <div class="card  shadow form-box d-flex flex-column  ">
<div class="topcard d-flex flex-column align-items-center justify-content-center mb-5 ">
 <img src="./assets/img/logo.png" class="logo-login ">
   <h1 class=" ">Smart Incubator System</h1>
   <p class="login-sub">Sign in to your account</p>
   </div>

         <!-- Form -->
    <form id="loginForm">

      <!-- Username or Email -->
      <div class="mb-3">
        <label class="form-label" for="userOrEmail">User Name or Email</label>
        <input type="text" class="form-control" id="userOrEmail"  placeholder="Enter your username or email" required>
      </div>

      <!-- Password -->
      <div class="password-box mb-3">
        <div class="d-flex flex-row justify-content-between ">
        <label class="form-label" for="password">Password</label>
         <button type="button" class="togglePassword " id="togglePassword">
          <i class="fa-regular fa-eye"></i>
         </button>
         </div>
        <input type="password" class="form-control" id="password"placeholder="Enter your password" required>
              <!--  <a href="#" class="forgot-link">Forgot password?</a>-->

      </div>
        <!-- Submit -->
<button type="submit" class="btn-submit " >
          <div class="spinner"></div>
          <span class="btn-text">
            <i class="fa-solid fa-arrow-right-to-bracket me-1"></i>
            Login
          </span>
        </button>

      <p id="msg" class="text-center mt-3"></p>

    </form>

  </div>

</div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/login.js"></script>

</body>
</html>
